<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 유치원 선생님 커뮤니티</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>유치원 선생님 커뮤니티</h1>
                <p>선생님들을 위한 소통 공간</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required
                           placeholder="아이디를 입력하세요">
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required
                           placeholder="비밀번호를 입력하세요">
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn btn-primary btn-full">로그인</button>
            </form>

            <div class="auth-footer">
                <p>아직 회원이 아니신가요?</p>
                <a href="signup.html" class="link">회원가입</a>
            </div>

            <div class="demo-accounts">
                <p>테스트 계정</p>
                <div class="demo-list">
                    <button type="button" class="demo-btn" data-username="kim_teacher" data-password="password123">
                        김민지 선생님
                    </button>
                    <button type="button" class="demo-btn" data-username="lee_teacher" data-password="password123">
                        이수연 선생님
                    </button>
                    <button type="button" class="demo-btn" data-username="park_teacher" data-password="password123">
                        박지영 선생님
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            await auth.login(username, password);
        });

        // 데모 계정 버튼
        document.querySelectorAll('.demo-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('username').value = btn.dataset.username;
                document.getElementById('password').value = btn.dataset.password;
            });
        });

        // 이미 로그인된 경우 메인으로 이동
        if (auth.isLoggedIn()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
