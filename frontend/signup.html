<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 유치원 선생님 커뮤니티</title>
    <link rel="stylesheet" href="css/style.css?v=10">
    <link rel="stylesheet" href="css/auth.css?v=10">
    <script>
        // 이미 로그인된 경우 메인으로 즉시 이동
        (function() {
            const token = localStorage.getItem('kindergarten_token');
            if (token) {
                window.location.replace('index.html');
            }
        })();
    </script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <h1>회원가입</h1>
                <p>유치원 선생님 커뮤니티에 가입하세요</p>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">아이디 *</label>
                        <input type="text" id="username" name="username" required
                               placeholder="영문, 숫자 조합">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 *</label>
                        <input type="email" id="email" name="email" required
                               placeholder="example@email.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">비밀번호 *</label>
                        <input type="password" id="password" name="password" required
                               placeholder="6자 이상" minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="password-confirm">비밀번호 확인 *</label>
                        <input type="password" id="password-confirm" name="password-confirm" required
                               placeholder="비밀번호 재입력">
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">이름 *</label>
                    <input type="text" id="name" name="name" required
                           placeholder="실명을 입력하세요">
                </div>

                <div class="form-group">
                    <label for="region">근무 지역 *</label>
                    <input type="text" id="region" name="region" required
                           placeholder="예: 서울시 강남구">
                </div>

                <div class="form-group">
                    <label>유치원 선택 방법 *</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="kg_method" value="existing" id="kg-existing" checked>
                            기존 유치원 선택
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="kg_method" value="new" id="kg-new">
                            새 유치원 등록
                        </label>
                    </div>
                </div>

                <div id="existing-kg-section" class="form-group">
                    <label for="kindergarten_id">유치원 선택 *</label>
                    <select id="kindergarten_id" name="kindergarten_id">
                        <option value="">유치원을 선택하세요</option>
                    </select>
                </div>

                <div id="new-kg-section" class="form-group" style="display: none;">
                    <label for="kindergarten_name">유치원 이름 *</label>
                    <input type="text" id="kindergarten_name" name="kindergarten_name"
                           placeholder="새로 등록할 유치원 이름">
                </div>

                <div class="form-group">
                    <label for="class_name">담당 반</label>
                    <input type="text" id="class_name" name="class_name"
                           placeholder="예: 햇님반">
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn btn-primary btn-full">가입하기</button>
            </form>

            <div class="auth-footer">
                <p>이미 회원이신가요?</p>
                <a href="login.html" class="link">로그인</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Load kindergartens on page load
        async function loadKindergartens() {
            try {
                const kindergartens = await api.getKindergartens();
                const select = document.getElementById('kindergarten_id');
                kindergartens.forEach(kg => {
                    const option = document.createElement('option');
                    option.value = kg.id;
                    option.textContent = `${kg.name}${kg.region ? ' (' + kg.region + ')' : ''}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load kindergartens:', error);
            }
        }

        // Toggle between existing and new kindergarten
        document.querySelectorAll('input[name="kg_method"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const existingSection = document.getElementById('existing-kg-section');
                const newSection = document.getElementById('new-kg-section');

                if (e.target.value === 'existing') {
                    existingSection.style.display = 'block';
                    newSection.style.display = 'none';
                    document.getElementById('kindergarten_id').required = true;
                    document.getElementById('kindergarten_name').required = false;
                } else {
                    existingSection.style.display = 'none';
                    newSection.style.display = 'block';
                    document.getElementById('kindergarten_id').required = false;
                    document.getElementById('kindergarten_name').required = true;
                }
            });
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (password !== passwordConfirm) {
                document.getElementById('error-message').textContent = '비밀번호가 일치하지 않습니다.';
                return;
            }

            const kgMethod = document.querySelector('input[name="kg_method"]:checked').value;

            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                name: document.getElementById('name').value,
                region: document.getElementById('region').value,
                class_name: document.getElementById('class_name').value || '미정'
            };

            if (kgMethod === 'existing') {
                const kgId = document.getElementById('kindergarten_id').value;
                if (!kgId) {
                    document.getElementById('error-message').textContent = '유치원을 선택해주세요.';
                    return;
                }
                data.kindergarten_id = parseInt(kgId);
            } else {
                const kgName = document.getElementById('kindergarten_name').value;
                if (!kgName) {
                    document.getElementById('error-message').textContent = '유치원 이름을 입력해주세요.';
                    return;
                }
                data.kindergarten_name = kgName;
            }

            await auth.signup(data);
        });

        // Initialize
        loadKindergartens();
    </script>
</body>
</html>
